<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1f"/>
      <stop offset="0.55" stop-color="#0f152e"/>
      <stop offset="1" stop-color="#1a1033"/>
    </linearGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#94a3b8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="860" cy="320" r="260" fill="url(#glowViolet)"/>
  <circle cx="1105" cy="175" r="150" fill="url(#glowGreen)"/>
  <circle cx="1105" cy="470" r="160" fill="url(#glowOrange)"/>

  <!-- scattered dots -->
  <g fill="#c7d2fe" opacity="0.5">
    <circle cx="120" cy="70" r="1.6"/><circle cx="300" cy="45" r="1.1"/><circle cx="520" cy="90" r="1.4"/>
    <circle cx="80" cy="560" r="1.3"/><circle cx="240" cy="600" r="1.6"/><circle cx="1230" cy="60" r="1.4"/>
    <circle cx="1250" cy="600" r="1.2"/><circle cx="680" cy="55" r="1.2"/><circle cx="980" cy="600" r="1.4"/>
  </g>

  <!-- ============ LEFT: text block ============ -->
  <g>
    <rect x="70" y="86" rx="14" ry="14" width="352" height="28" fill="#1e293b" stroke="#334155"/>
    <text x="86" y="105" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13" letter-spacing="1.5" fill="#94a3b8">AMD DEVELOPER HACKATHON · TRACK 1</text>

    <text x="68" y="190" font-family="'DejaVu Sans',Arial,sans-serif" font-size="62" font-weight="bold" fill="url(#titleGrad)">Hybrid Routing</text>
    <text x="68" y="260" font-family="'DejaVu Sans',Arial,sans-serif" font-size="62" font-weight="bold" fill="url(#titleGrad)">Agent</text>

    <text x="70" y="318" font-family="'DejaVu Sans',Arial,sans-serif" font-size="21" fill="#cbd5e1">Every query takes the cheapest path</text>
    <text x="70" y="348" font-family="'DejaVu Sans',Arial,sans-serif" font-size="21" fill="#cbd5e1">that still gets the answer right.</text>

    <!-- feature chips -->
    <g font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14">
      <rect x="70" y="388" rx="15" ry="15" width="180" height="30" fill="#052e22" stroke="#10b981" stroke-opacity="0.6"/>
      <text x="88" y="408" fill="#34d399">local-first · $0</text>
      <rect x="262" y="388" rx="15" ry="15" width="205" height="30" fill="#2a1205" stroke="#f97316" stroke-opacity="0.6"/>
      <text x="280" y="408" fill="#fb923c">fireworks fallback</text>
      <rect x="70" y="428" rx="15" ry="15" width="235" height="30" fill="#171335" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <text x="88" y="448" fill="#a78bfa">12-signal complexity</text>
      <rect x="317" y="428" rx="15" ry="15" width="150" height="30" fill="#0f1c33" stroke="#60a5fa" stroke-opacity="0.6"/>
      <text x="335" y="448" fill="#93c5fd">8 task types</text>
    </g>

    <text x="70" y="580" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14" fill="#64748b">ghcr.io/syk-v1/hybrid-routing-agent · Ollama phi3:mini + Fireworks AI</text>
  </g>

  <!-- ============ RIGHT: routing diagram ============ -->

  <!-- incoming query pills -->
  <g font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13">
    <rect x="640" y="140" rx="13" ry="13" width="118" height="26" fill="#1e293b" stroke="#475569"/>
    <text x="656" y="158" fill="#e2e8f0">"12 + 47"</text>
    <rect x="540" y="307" rx="13" ry="13" width="150" height="26" fill="#1e293b" stroke="#475569"/>
    <text x="556" y="325" fill="#e2e8f0">"summarise…"</text>
    <rect x="548" y="474" rx="13" ry="13" width="140" height="26" fill="#1e293b" stroke="#475569"/>
    <text x="564" y="492" fill="#e2e8f0">"debug this"</text>
  </g>

  <!-- converging lines into router -->
  <g fill="none" stroke="#64748b" stroke-width="1.6" opacity="0.8">
    <path d="M 758 153 C 795 153, 785 255, 806 290"/>
    <path d="M 692 320 L 792 320"/>
    <path d="M 690 487 C 745 487, 762 380, 806 348"/>
  </g>

  <!-- router hexagon -->
  <g filter="url(#soft)">
    <path d="M 860 250 L 916 285 L 916 355 L 860 390 L 804 355 L 804 285 Z"
          fill="#131a33" stroke="url(#hexGrad)" stroke-width="3"/>
  </g>
  <text x="860" y="310" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="19" font-weight="bold" fill="#c7d2fe">ROUTER</text>
  <!-- tiny complexity meter -->
  <rect x="826" y="328" width="68" height="7" rx="3.5" fill="#1e293b"/>
  <rect x="826" y="328" width="24" height="7" rx="3.5" fill="#34d399"/>
  <rect x="850" y="328" width="22" height="7" rx="0" fill="#fbbf24"/>
  <rect x="872" y="328" width="22" height="7" rx="3.5" fill="#f97316"/>
  <text x="860" y="356" text-anchor="middle" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="11" fill="#94a3b8">complexity 0→1</text>

  <!-- branch: local (top right) -->
  <path d="M 902 268 C 950 225, 985 205, 1022 192" fill="none" stroke="#34d399" stroke-width="2.6" filter="url(#soft)"/>
  <text x="948" y="212" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12" fill="#34d399" transform="rotate(-22 948 212)">score &lt; 0.30</text>

  <!-- branch: remote (bottom right) -->
  <path d="M 902 372 C 950 415, 985 435, 1022 448" fill="none" stroke="#f97316" stroke-width="2.6" filter="url(#soft)"/>
  <text x="944" y="446" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12" fill="#fb923c" transform="rotate(22 944 446)">score &gt; 0.65</text>

  <!-- cascade dashed line -->
  <path d="M 1105 240 L 1105 400" fill="none" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="6 6" opacity="0.85"/>
  <rect x="1054" y="303" rx="11" ry="11" width="102" height="24" fill="#241a05" stroke="#fbbf24" stroke-opacity="0.7"/>
  <text x="1105" y="320" text-anchor="middle" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12" fill="#fbbf24">cascade ↓</text>

  <!-- LOCAL node -->
  <g filter="url(#soft)">
    <rect x="1030" y="140" rx="16" ry="16" width="150" height="98" fill="#0b2018" stroke="#34d399" stroke-width="2.4"/>
  </g>
  <!-- chip icon -->
  <g transform="translate(1051,158)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="none" stroke="#34d399" stroke-width="2"/>
    <rect x="7" y="7" width="12" height="12" rx="2" fill="#34d399"/>
    <g stroke="#34d399" stroke-width="2">
      <line x1="5" y1="-6" x2="5" y2="0"/><line x1="13" y1="-6" x2="13" y2="0"/><line x1="21" y1="-6" x2="21" y2="0"/>
      <line x1="5" y1="26" x2="5" y2="32"/><line x1="13" y1="26" x2="13" y2="32"/><line x1="21" y1="26" x2="21" y2="32"/>
    </g>
  </g>
  <text x="1090" y="177" font-family="'DejaVu Sans',Arial,sans-serif" font-size="19" font-weight="bold" fill="#6ee7b7">LOCAL</text>
  <text x="1051" y="207" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13" fill="#a7f3d0">phi3:mini</text>
  <text x="1051" y="226" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13" fill="#34d399">0 tokens · free</text>

  <!-- FIREWORKS node -->
  <g filter="url(#soft)">
    <rect x="1030" y="402" rx="16" ry="16" width="150" height="98" fill="#220d05" stroke="#f97316" stroke-width="2.4"/>
  </g>
  <!-- flame icon (local coords, sits left of the title like the chip icon above) -->
  <g transform="translate(1049,411)">
    <path d="M 13 0 C 14 6, 19 9, 19 16 C 19 21.5, 15.5 26, 11 26 C 6.5 26, 3 22, 3 16.5
             C 3 13, 5 9.5, 7.5 7.5 C 7.5 11, 9.5 12.5, 10.5 12 C 9 8, 10.5 3.5, 13 0 Z"
          fill="url(#fireGrad)"/>
  </g>
  <text x="1080" y="432" font-family="'DejaVu Sans',Arial,sans-serif" font-size="15" font-weight="bold" fill="#fdba74">FIREWORKS</text>
  <text x="1051" y="466" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13" fill="#fed7aa">glm / gpt-oss</text>
  <text x="1051" y="486" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13" fill="#fb923c">only when needed</text>
</svg>
